# sample configuration copied from docs/tmcm_config_yml.txt

# Connection to Broker
broker_ip: 192.168.2.32
broker_port: 1883

# Client configuration
client_name: tmc1
sb_cnt: 2
meas_delay: 4

# Payload configuration
plv: 0.1.0

ds_nr: 0

# Temperature sensor names and values
# each list will be cycled through on every measurement
# the example below uses a short set for demonstration

ts_dat:
  "s0": [20.00, 20.10, 20.20, 20.30, 20.40]
  "s1": [21.90, 21.80, 21.70, 21.60, 21.50]
  "s2": [22.00, 22.10, 22.20, 22.30, 22.40]
  "s3": [23.90, 23.80, 23.70, 23.60, 23.50]
  "s4": [24.00, 24.10, 24.20, 24.30, 24.40]
  "s5": [25.90, 25.80, 25.70, 25.60, 25.50]
  "s6": [26.00, 26.10, 26.20, 26.30, 26.40]
  "s7": [27.90, 27.80, 27.70, 27.60, 27.50]
